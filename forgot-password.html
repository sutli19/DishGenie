<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DishGenie - Forgot Password</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="login-wrapper">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-container">
                    <img src="DishGenie.png" alt="DishGenie Logo" class="logo-image">
                </div>
                <p class="tagline">Reset Your Password</p>
            </div>

            <!-- Forgot Password Form -->
            <div class="form-container">
                <div class="form-header">
                    <h2>Forgot Password?</h2>
                    <p>Answer your security question to reset</p>
                </div>

                <!-- Step 1: Enter User ID -->
                <form id="userIdForm" class="login-form">
                    <div class="input-group">
                        <label for="userId">User ID</label>
                        <input 
                            type="text" 
                            id="userId" 
                            name="userId" 
                            placeholder="Enter your User ID"
                            required
                            pattern="[a-zA-Z0-9_]+"
                        >
                    </div>

                    <button type="submit" class="login-btn">
                        <span>Continue</span>
                    </button>
                </form>

                <!-- Step 2: Answer Security Question -->
                <form id="securityForm" class="login-form" style="display: none;">
                    <div class="input-group">
                        <label id="securityQuestionLabel">Security Question</label>
                        <p id="securityQuestionText" style="color: #10b981; font-weight: 600; margin-bottom: 10px;"></p>
                    </div>

                    <div class="input-group">
                        <label for="securityAnswer">Your Answer</label>
                        <input 
                            type="text" 
                            id="securityAnswer" 
                            name="securityAnswer" 
                            placeholder="Enter your answer"
                            required
                        >
                    </div>

                    <button type="submit" class="login-btn">
                        <span>Verify Answer</span>
                    </button>
                </form>

                <!-- Step 3: Reset Password -->
                <form id="resetPasswordForm" class="login-form" style="display: none;">
                    <div class="input-group">
                        <label for="newPassword">New Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="newPassword" 
                                name="newPassword" 
                                placeholder="Create new password"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('newPassword', 'eyeIcon1')">
                                <span id="eyeIcon1">👁️</span>
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirmNewPassword">Confirm New Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="confirmNewPassword" 
                                name="confirmNewPassword" 
                                placeholder="Confirm new password"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('confirmNewPassword', 'eyeIcon2')">
                                <span id="eyeIcon2">👁️</span>
                            </button>
                        </div>
                        <small id="passwordMatch" style="font-size: 12px; margin-top: 5px; display: block;"></small>
                    </div>

                    <button type="submit" class="login-btn">
                        <span>Reset Password</span>
                    </button>
                </form>

                <!-- Back to Login -->
                <div class="signup-link">
                    <p>Remember your password? <a href="login.html">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="forgot-password.js"></script>
</body>
</html>
