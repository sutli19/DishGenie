<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DishGenie - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="login-wrapper">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-container">
                    <img src="DishGenie.png" alt="DishGenie Logo" class="logo-image">
                </div>
                <p class="tagline">Your Smart Cooking Assistant</p>
            </div>

            <!-- Login Form -->
            <div class="form-container">
                <div class="form-header">
                    <h2>Welcome Back!</h2>
                    <p>Login to continue cooking magic</p>
                </div>

                <form id="loginForm" class="login-form">
                    <!-- User ID Input -->
                    <div class="input-group">
                        <label for="userId">User ID</label>
                        <input 
                            type="text" 
                            id="userId" 
                            name="userId" 
                            placeholder="Enter your User ID (e.g., john_205)"
                            required
                            pattern="[a-zA-Z0-9_]+"
                            title="User ID can only contain letters, numbers, and underscores"
                        >
                    </div>

                    <!-- Password Input -->
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Enter your password"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <span id="eyeIcon">👁️</span>
                            </button>
                        </div>
                    </div>

                    <!-- Forgot Password -->
                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="login-btn" id="loginBtn">
                        <span id="loginBtnText">Login</span>
                        <div id="loginSpinner" class="spinner hidden"></div>
                    </button>
                </form>

                <!-- Sign Up Link -->
                <div class="signup-link">
                    <p>Don't have an account? <a href="signup.html">Sign up now</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
