        .youtube-btn { background: #ef4444; color: white; padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 30px; }

        .section-title { font-size: 24px; font-weight: bold; color: #1f2937; margin: 30px 0 20px; }
        .nutrition-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; background: #f9fafb; padding: 20px; border-radius: 15px; margin-bottom: 30px; }

            {id:1,name:"Spaghetti Aglio e Olio",image:"🍝",time:20,calories:420,protein:12,carbs:68,fat:14,diet:"veg",cuisine:"Italian",meal:"dinner",mood:"comfort",taste:"savory",bmi:"normal",ingredients:["400g Spaghetti","6 cloves Garlic (minced)","100ml Olive oil","Red pepper flakes"],optional:["Fresh parsley","Parmesan cheese","Lemon zest"],steps:["Bring a large pot of salted water to boil and cook spaghetti according to package directions until al dente","While pasta cooks, heat olive oil in a large pan over medium heat","Add minced garlic and red pepper flakes, sauté for 2-3 minutes until fragrant but not browned","Reserve 1 cup pasta water, then drain the spaghetti","Add drained pasta to the garlic oil, toss well, adding pasta water as needed for silky texture","Season with salt and pepper, garnish with parsley if desired, and serve immediately"]},
            {id:2,name:"Butter Chicken",image:"🍛",time:50,calories:580,protein:45,carbs:32,fat:28,diet:"non-veg",cuisine:"Indian",meal:"dinner",mood:"comfort",taste:"spicy",bmi:"normal",ingredients:["800g Chicken breast (cubed)","200g Butter","300ml Heavy cream","400g Tomato puree","2 tbsp Garam masala","Ginger-garlic paste"],optional:["Kasuri methi","Fresh cream for garnish"],steps:["Marinate chicken pieces with yogurt, ginger-garlic paste, and half the garam masala for at least 30 minutes","Heat half the butter in a large pan and cook marinated chicken until golden brown on all sides","Remove chicken and set aside, in the same pan add remaining butter","Add tomato puree and cook for 5-6 minutes until oil separates","Add remaining garam masala, salt, and a pinch of sugar","Pour in the cream and bring to a gentle simmer","Add the cooked chicken back to the sauce and simmer for 10-15 minutes","Finish with a swirl of cream and serve hot with naan or rice"]},
            {id:3,name:"Avocado Toast",image:"🥑",time:15,calories:320,protein:12,carbs:36,fat:18,diet:"veg",cuisine:"American",meal:"breakfast",mood:"energetic",taste:"savory",bmi:"low",ingredients:["2 slices Whole grain bread","1 ripe Avocado","1 Egg","Cherry tomatoes"],optional:["Everything bagel seasoning","Microgreens","Hot sauce"],steps:["Toast the bread slices until golden and crispy","While bread toasts, mash the ripe avocado in a bowl with salt, pepper, and a squeeze of lemon","Cook the egg to your preference (poached, fried, or scrambled)","Spread the mashed avocado generously on the toasted bread","Top with the cooked egg and halved cherry tomatoes","Season with additional salt, pepper, and optional toppings","Serve immediately while the toast is still warm"]},
            {id:4,name:"Pad Thai",image:"🍜",time:30,calories:510,protein:28,carbs:62,fat:18,diet:"non-veg",cuisine:"Thai",meal:"lunch",mood:"adventurous",taste:"sweet-sour",bmi:"normal",ingredients:["200g Rice noodles","300g Shrimp (peeled)","100g Roasted peanuts (crushed)","3 tbsp Tamarind paste","2 tbsp Fish sauce","Bean sprouts","Eggs"],optional:["Lime wedges","Cilantro","Dried shrimp"],steps:["Soak rice noodles in warm water for 20 minutes until soft, then drain","Heat oil in a wok over high heat and scramble 2 eggs, set aside","In the same wok, stir-fry shrimp until pink and cooked through","Add softened noodles, tamarind paste, fish sauce, and palm sugar","Toss everything together for 2-3 minutes until well combined","Add bean sprouts and cooked egg, toss for another minute","Serve hot garnished with crushed peanuts, lime wedges, and fresh cilantro"]},
            {id:5,name:"Chocolate Lava Cake",image:"🍰",time:25,calories:450,protein:8,carbs:54,fat:24,diet:"veg",cuisine:"French",meal:"dessert",mood:"indulgent",taste:"sweet",bmi:"normal",ingredients:["200g Dark chocolate","150g Butter","3 Eggs","100g Sugar","50g All-purpose flour"],optional:["Vanilla ice cream","Powdered sugar","Fresh berries"],steps:["Preheat oven to 200°C (400°F) and butter 4 ramekins","Melt dark chocolate and butter together in a double boiler, stirring until smooth","In a separate bowl, whisk eggs and sugar until thick and pale","Fold the melted chocolate mixture into the egg mixture gently","Sift in flour and fold until just combined, do not overmix","Divide batter among prepared ramekins, filling them 3/4 full","Bake for 12-14 minutes until edges are set but center is still soft","Let cool for 1 minute, then invert onto plates and serve immediately with ice cream"]},
            {id:6,name:"Caesar Salad",image:"🥗",time:25,calories:380,protein:32,carbs:18,fat:22,diet:"non-veg",cuisine:"American",meal:"lunch",mood:"light",taste:"savory",bmi:"low",ingredients:["2 Chicken breasts","1 head Romaine lettuce","Caesar dressing","Croutons","Parmesan cheese"],optional:["Anchovies","Black pepper","Lemon wedges"],steps:["Season chicken breasts with salt, pepper, and Italian herbs","Grill or pan-fry chicken for 6-7 minutes per side until cooked through and juices run clear","Let chicken rest for 5 minutes, then slice into strips","Wash and chop romaine lettuce into bite-sized pieces","In a large bowl, toss lettuce with Caesar dressing until well coated","Add croutons and toss gently to combine","Top with sliced chicken and generous shavings of Parmesan cheese","Serve immediately with extra dressing on the side"]},
            {id:7,name:"Veggie Stir Fry",image:"🥘",time:20,calories:250,protein:8,carbs:38,fat:9,diet:"veg",cuisine:"Chinese",meal:"dinner",mood:"healthy",taste:"savory",bmi:"low",ingredients:["Mixed vegetables (bell peppers, broccoli, carrots)","3 tbsp Soy sauce","2 tbsp Sesame oil","Ginger and garlic","Cornstarch slurry"],optional:["Cashews","Sesame seeds","Green onions"],steps:["Cut all vegetables into uniform bite-sized pieces for even cooking","Heat sesame oil in a wok or large pan over high heat until smoking","Add minced ginger and garlic, stir-fry for 30 seconds until fragrant","Add harder vegetables first (carrots, broccoli) and stir-fry for 3 minutes","Add softer vegetables (bell peppers) and continue stir-frying for 2 minutes","Pour in soy sauce and a splash of water, toss well","Add cornstarch slurry to thicken the sauce, toss for 1 minute","Serve hot over steamed rice, garnished with sesame seeds"]},
            {id:8,name:"Margherita Pizza",image:"🍕",time:45,calories:520,protein:22,carbs:68,fat:18,diet:"veg",cuisine:"Italian",meal:"dinner",mood:"comfort",taste:"savory",bmi:"normal",ingredients:["Pizza dough","400g Tomato sauce","300g Fresh mozzarella","Fresh basil leaves","Olive oil"],optional:["Garlic powder","Oregano","Balsamic glaze"],steps:["Preheat oven to maximum temperature (250°C/480°F) with pizza stone if available","Roll out pizza dough on a floured surface to desired thickness","Transfer dough to a pizza peel or baking sheet dusted with cornmeal","Spread tomato sauce evenly over the dough, leaving a 1-inch border","Tear fresh mozzarella and distribute evenly over the sauce","Drizzle with olive oil and season with salt and pepper","Bake for 10-12 minutes until crust is golden and cheese is bubbly","Remove from oven, top with fresh basil leaves, and let cool for 2 minutes before slicing"]},
            {id:9,name:"Salmon Teriyaki",image:"🐟",time:30,calories:420,protein:38,carbs:42,fat:12,diet:"non-veg",cuisine:"Japanese",meal:"dinner",mood:"healthy",taste:"sweet-savory",bmi:"low",ingredients:["2 Salmon fillets","100ml Teriyaki sauce","2 cups Cooked rice","Sesame seeds","Green onions"],optional:["Pickled ginger","Wasabi","Edamame"],steps:["Pat salmon fillets dry and season with salt and pepper","Marinate salmon in teriyaki sauce for 15 minutes at room temperature","Heat a non-stick pan over medium-high heat with a little oil","Place salmon skin-side down and cook for 4-5 minutes until skin is crispy","Flip carefully and cook for another 3-4 minutes, basting with teriyaki sauce","Remove from heat when salmon is cooked through but still moist inside","Serve over steamed rice, drizzle with remaining teriyaki sauce","Garnish with sesame seeds and sliced green onions"]},
            {id:10,name:"Vegetable Biryani",image:"🍚",time:60,calories:450,protein:12,carbs:78,fat:12,diet:"veg",cuisine:"Indian",meal:"dinner",mood:"festive",taste:"spicy",bmi:"normal",ingredients:["2 cups Basmati rice","Mixed vegetables (carrots, peas, beans)","Biryani spices (cardamom, cloves, bay leaf)","2 Onions (fried)","Fresh coriander and mint"],optional:["Saffron milk","Fried cashews","Raisins"],steps:["Soak basmati rice for 30 minutes, then drain","Parboil rice with whole spices until 70% cooked, drain and set aside","In a heavy-bottomed pot, heat oil and sauté mixed vegetables with ginger-garlic paste","Add yogurt, biryani masala, salt, and cook vegetables until tender","Layer half the vegetables at the bottom of the pot","Add a layer of half the rice, then remaining vegetables, then remaining rice","Top with fried onions, fresh herbs, and saffron milk","Cover tightly and cook on low heat (dum) for 20 minutes","Let rest for 5 minutes, then gently mix and serve hot with raita"]},
            {id:11,name:"Greek Salad",image:"🥗",time:15,calories:280,protein:8,carbs:18,fat:20,diet:"veg",cuisine:"Greek",meal:"lunch",mood:"light",taste:"tangy",bmi:"low",ingredients:["Tomatoes","Cucumber","200g Feta cheese","Kalamata olives","Red onion","Olive oil and lemon dressing"],optional:["Oregano","Capers","Green bell pepper"],steps:["Cut tomatoes and cucumber into bite-sized chunks","Slice red onion thinly and soak in cold water for 5 minutes to reduce sharpness","In a large bowl, combine tomatoes, cucumber, and drained onion","Add pitted Kalamata olives","Crumble feta cheese over the vegetables","Drizzle generously with olive oil and fresh lemon juice","Season with salt, pepper, and dried oregano","Toss gently and serve immediately at room temperature"]},
            {id:12,name:"Beef Burger",image:"🍔",time:35,calories:720,protein:42,carbs:54,fat:36,diet:"non-veg",cuisine:"American",meal:"lunch",mood:"indulgent",taste:"savory",bmi:"high",ingredients:["500g Ground beef","Burger buns","Cheddar cheese slices","Lettuce, tomato, onion","Pickles"],optional:["Bacon","Special sauce","Jalapeños"],steps:["Divide ground beef into 4 equal portions and shape into patties, slightly larger than the buns","Season generously with salt and pepper on both sides","Preheat grill or pan to high heat","Cook patties for 4 minutes on first side without moving them","Flip and cook for 3-4 minutes more, adding cheese in the last minute to melt","Toast burger buns cut-side down on the grill for 1 minute","Assemble burgers: bottom bun, sauce, lettuce, patty with cheese, tomato, onion, pickles, top bun","Serve immediately with fries or a side salad"]},
            {id:13,name:"Tom Yum Soup",image:"🍲",time:30,calories:180,protein:22,carbs:12,fat:6,diet:"non-veg",cuisine:"Thai",meal:"dinner",mood:"comforting",taste:"spicy-sour",bmi:"low",ingredients:["300g Shrimp (peeled)","4 cups Chicken stock","3 stalks Lemongrass (bruised)","Galangal slices","Kaffir lime leaves","Thai chilies","Fish sauce and lime juice"],optional:["Straw mushrooms","Cherry tomatoes","Cilantro"],steps:["Bring chicken stock to a boil in a large pot","Add lemongrass, galangal, and kaffir lime leaves, simmer for 5 minutes","Add Thai chilies (crushed) and mushrooms if using","Season with fish sauce to taste","Add shrimp and cherry tomatoes, cook for 3-4 minutes until shrimp turn pink","Remove from heat and add fresh lime juice","Taste and adjust seasoning with more fish sauce or lime as needed","Serve hot garnished with fresh cilantro"]},
            {id:14,name:"Fluffy Pancakes",image:"🥞",time:20,calories:380,protein:12,carbs:58,fat:12,diet:"veg",cuisine:"American",meal:"breakfast",mood:"comforting",taste:"sweet",bmi:"normal",ingredients:["2 cups All-purpose flour","2 Eggs","300ml Milk","2 tbsp Melted butter","2 tbsp Sugar","Baking powder"],optional:["Maple syrup","Fresh berries","Whipped cream"],steps:["In a large bowl, whisk together flour, sugar, baking powder, and a pinch of salt","In another bowl, beat eggs and mix in milk and melted butter","Pour wet ingredients into dry ingredients and mix until just combined (batter should be slightly lumpy)","Heat a non-stick pan or griddle over medium heat and lightly grease","Pour 1/4 cup batter for each pancake onto the hot surface","Cook until bubbles form on surface and edges look set, about 2-3 minutes","Flip and cook for another 1-2 minutes until golden brown","Serve hot stacked with butter and maple syrup"]},
            {id:15,name:"Chicken Tikka Masala",image:"🍛",time:55,calories:520,protein:48,carbs:28,fat:24,diet:"non-veg",cuisine:"Indian",meal:"dinner",mood:"comfort",taste:"spicy",bmi:"normal",ingredients:["800g Chicken thighs (cubed)","Tikka spices (cumin, coriander, paprika, turmeric)","300ml Heavy cream","Tomato-based curry sauce","Ginger-garlic paste","Yogurt for marinade"],optional:["Kasuri methi","Garam masala","Fresh cilantro"],steps:["Mix chicken with yogurt, tikka spices, and ginger-garlic paste, marinate for at least 2 hours","Thread marinated chicken onto skewers and grill or broil until charred and cooked through","In a large pan, heat oil and sauté onions until golden","Add ginger-garlic paste and tomato puree, cook until oil separates","Add remaining tikka spices and cook for 2 minutes","Pour in cream and bring to a gentle simmer","Add the grilled chicken pieces to the sauce","Simmer for 10-15 minutes, finish with kasuri methi and garam masala","Serve hot with naan bread or basmati rice"]},

        ];

        let favorites = [];
        let currentView = 'all';

        // Load favorites from localStorage
        function loadFavorites() {
            const saved = localStorage.getItem('dishgenie_favorites');
            if (saved) {
                favorites = JSON.parse(saved);
            }
            updateFavCount();
        }

        // Save favorites to localStorage
        function saveFavorites() {
            localStorage.setItem('dishgenie_favorites', JSON.stringify(favorites));
            updateFavCount();
        }

        // Update favorite count
        function updateFavCount() {
            document.getElementById('favCount').textContent = favorites.length;
        }

        // Toggle favorite
        function toggleFavorite(recipeId) {
            const index = favorites.indexOf(recipeId);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(recipeId);
            }
            saveFavorites();
            renderRecipes();
            if (document.getElementById('sidePanel').classList.contains('active')) {
                renderSidePanel();
            }
        }

        // Render recipes in main grid
        function renderRecipes() {
            const grid = document.getElementById('recipeGrid');
            grid.innerHTML = '';
            
            recipes.forEach(recipe => {
                const isFavorite = favorites.includes(recipe.id);
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.innerHTML = `
                    <button class="favorite-btn" onclick="toggleFavorite(${recipe.id}); event.stopPropagation();">
                        ${isFavorite ? '❤️' : '🤍'}
                    </button>
                    <div class="recipe-image">${recipe.image}</div>
                    <div class="recipe-content">
                        <div class="tag tag-${recipe.diet}">${recipe.diet === 'veg' ? 'Vegetarian' : 'Non-Veg'}</div>
                        <div class="recipe-title">${recipe.name}</div>
                        <div class="recipe-meta">
                            <span class="meta-item">⏱️ ${recipe.time} min</span>
                            <span class="meta-item">🔥 ${recipe.calories} cal</span>
                        </div>
                        <div class="nutrition-preview">
                            <span class="nutrition-badge">💪 ${recipe.protein}g protein</span>
                            <span class="nutrition-badge">🌾 ${recipe.carbs}g carbs</span>
                            <span class="nutrition-badge">🥑 ${recipe.fat}g fat</span>
                        </div>
                        <button class="view-recipe-btn" onclick="openRecipeModal(${recipe.id}); event.stopPropagation();">View Recipe</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Render side panel
        function renderSidePanel() {
            const content = document.getElementById('panelContent');
            const recipesToShow = currentView === 'all' ? recipes : recipes.filter(r => favorites.includes(r.id));
            
            if (currentView === 'favorites' && favorites.length === 0) {
                content.innerHTML = `
                    <div class="empty-favorites">
                        <div class="empty-favorites-icon">💔</div>
                        <div>No favorites yet! Start adding recipes you love.</div>
                    </div>
                `;
                return;
            }

            content.innerHTML = recipesToShow.map(recipe => {
                const isFavorite = favorites.includes(recipe.id);
                return `
                    <div class="recipe-list-item" onclick="openRecipeModal(${recipe.id})">
                        <div class="recipe-list-emoji">${recipe.image}</div>
                        <div class="recipe-list-info">
                            <div class="recipe-list-name">${recipe.name}</div>
                            <div class="recipe-list-meta">${recipe.time} min • ${recipe.calories} cal • ${recipe.cuisine}</div>
                        </div>
                        <button class="list-fav-btn" onclick="toggleFavorite(${recipe.id}); event.stopPropagation();">
                            ${isFavorite ? '❤️' : '🤍'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        // Open recipe modal
        function openRecipeModal(recipeId) {
            const recipe = recipes.find(r => r.id === recipeId);
            if (!recipe) return;

            const modal = document.getElementById('modal');
            const header = document.getElementById('modalHeader');
            const body = document.getElementById('modalBody');

            // Get rating
            const ratings = JSON.parse(localStorage.getItem('dishgenie_ratings') || '{}');
            const rating = ratings[recipeId] || 0;

            header.innerHTML = `
                <button class="close-modal" onclick="closeModal()">✕</button>
                ${recipe.image}
            `;

            body.innerHTML = `
                <h1 class="modal-title">${recipe.name}</h1>
                <div class="modal-meta">
                    <span class="meta-item">⏱️ ${recipe.time} minutes</span>
                    <span class="meta-item">🔥 ${recipe.calories} calories</span>
                    <span class="meta-item">🍽️ ${recipe.cuisine}</span>
                    <span class="meta-item tag tag-${recipe.diet}">${recipe.diet === 'veg' ? 'Vegetarian' : 'Non-Vegetarian'}</span>
                </div>

                <div class="rating-section">
                    <div class="rating-display">
                        <div class="stars" id="stars-${recipeId}">
                            ${[1,2,3,4,5].map(i => `<span class="star ${i <= rating ? 'filled' : 'empty'}" onclick="rateRecipe(${recipeId}, ${i})">★</span>`).join('')}
                        </div>
                        <span class="rating-text">${rating > 0 ? `${rating}/5 stars` : 'Not rated yet'}</span>
                    </div>
                </div>

                <button class="youtube-btn" onclick="window.open('https://www.youtube.com/results?search_query=${encodeURIComponent(recipe.name + ' recipe')}', '_blank')">
                    ▶️ Watch Tutorial on YouTube
                </button>

                <h2 class="section-title">Nutritional Information</h2>
                <div class="nutrition-grid">
                    <div class="nutrition-item">
                        <div class="nutrition-value">${recipe.calories}</div>
                        <div class="nutrition-label">Calories</div>
                    </div>
                    <div class="nutrition-item">
                        <div class="nutrition-value">${recipe.protein}g</div>
                        <div class="nutrition-label">Protein</div>
                    </div>
                    <div class="nutrition-item">
                        <div class="nutrition-value">${recipe.carbs}g</div>
                        <div class="nutrition-label">Carbs</div>
                    </div>
                    <div class="nutrition-item">
                        <div class="nutrition-value">${recipe.fat}g</div>
                        <div class="nutrition-label">Fat</div>
                    </div>
                </div>

                <h2 class="section-title">Main Ingredients</h2>
                <ul class="ingredients-list">
                    ${recipe.ingredients.map(ing => `<li class="ingredient-item">${ing}</li>`).join('')}
                </ul>

                ${recipe.optional && recipe.optional.length > 0 ? `
                    <div class="optional-section">
                        <div class="optional-title">Optional Ingredients</div>
                        <ul class="ingredients-list">
                            ${recipe.optional.map(ing => `<li class="ingredient-item">${ing}</li>`).join('')}
                        </ul>
                    </div>
                ` : ''}

                <h2 class="section-title">Cooking Instructions</h2>
                <ol class="steps-list">
                    ${recipe.steps.map((step, i) => `
                        <li class="step-item">
                            <div class="step-number">${i + 1}</div>
                            <div class="step-text">${step}</div>
                        </li>
                    `).join('')}
                </ol>
            `;

            modal.classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Rate recipe
        function rateRecipe(recipeId, stars) {
            const ratings = JSON.parse(localStorage.getItem('dishgenie_ratings') || '{}');
            ratings[recipeId] = stars;
            localStorage.setItem('dishgenie_ratings', JSON.stringify(ratings));
            
            // Update stars display
            const starsContainer = document.getElementById(`stars-${recipeId}`);
            if (starsContainer) {
                starsContainer.innerHTML = [1,2,3,4,5].map(i => 
                    `<span class="star ${i <= stars ? 'filled' : 'empty'}" onclick="rateRecipe(${recipeId}, ${i})">★</span>`
                ).join('');
                starsContainer.parentElement.querySelector('.rating-text').textContent = `${stars}/5 stars`;
            }
        }

        // Panel controls
        document.getElementById('openPanel').addEventListener('click', () => {
            document.getElementById('sidePanel').classList.add('active');
            renderSidePanel();
        });

        document.getElementById('closePanel').addEventListener('click', () => {
            document.getElementById('sidePanel').classList.remove('active');
        });

        document.getElementById('allTab').addEventListener('click', () => {
            currentView = 'all';
            document.getElementById('allTab').classList.add('active');
            document.getElementById('favTab').classList.remove('active');
            renderSidePanel();
        });

        document.getElementById('favTab').addEventListener('click', () => {
            currentView = 'favorites';
            document.getElementById('favTab').classList.remove('active');
            document.getElementById('allTab').classList.remove('active');
            document.getElementById('favTab').classList.add('active');
            renderSidePanel();
        });

        // Close modal when clicking outside
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        // Logout function
        function logout() {
            window.location.href = 'login.html';
        }

        // Initialize
        loadFavorites();
        renderRecipes();
    </script>
</body>
</html>
