<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DishGenie - Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="container">
        <div class="signup-wrapper">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-container">
                    <img src="DishGenie.png" alt="DishGenie Logo" class="logo-image">
                </div>
                <p class="tagline">Your Smart Cooking Assistant</p>
                <p class="quote">"Cooking is an art, but we make it simple!"</p>
            </div>

            <!-- Sign Up Form -->
            <div class="form-container">
                <div class="form-header">
                    <h2>Create Account</h2>
                    <p>Let's get started with DishGenie</p>
                </div>

                <form id="signupForm" class="signup-form">
                    <!-- Full Name -->
                    <div class="input-group">
                        <label for="fullName">Full Name</label>
                        <input 
                            type="text" 
                            id="fullName" 
                            name="fullName" 
                            placeholder="Enter your full name"
                            required
                        >
                    </div>

                    <!-- User ID -->
                    <div class="input-group">
                        <label for="userId">User ID</label>
                        <input 
                            type="text" 
                            id="userId" 
                            name="userId" 
                            placeholder="Create a User ID (e.g., john_205)"
                            required
                            pattern="[a-zA-Z0-9_]+"
                            title="User ID can only contain letters, numbers, and underscores"
                        >
                        <small id="userIdFeedback" class="input-feedback"></small>
                    </div>

                    <!-- Password -->
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Create a strong password"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('password', 'eyeIcon1')">
                                <span id="eyeIcon1">👁️</span>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                placeholder="Confirm your password"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', 'eyeIcon2')">
                                <span id="eyeIcon2">👁️</span>
                            </button>
                        </div>
                        <small id="passwordMatch" class="password-feedback"></small>
                    </div>

                    <!-- Security Question -->
                    <div class="input-group">
                        <label for="securityQuestion">Security Question</label>
                        <select id="securityQuestion" name="securityQuestion" required>
                            <option value="">Choose a security question...</option>
                            <option value="What's your favorite food?">What's your favorite food?</option>
                            <option value="What's your favorite animal?">What's your favorite animal?</option>
                            <option value="What city were you born in?">What city were you born in?</option>
                            <option value="What's your mother's maiden name?">What's your mother's maiden name?</option>
                            <option value="What's your favorite color?">What's your favorite color?</option>
                            <option value="What was your first pet's name?">What was your first pet's name?</option>
                            <option value="What's your favorite movie?">What's your favorite movie?</option>
                            <option value="What's your childhood nickname?">What's your childhood nickname?</option>
                            <option value="What street did you grow up on?">What street did you grow up on?</option>
                            <option value="What's your favorite book?">What's your favorite book?</option>
                        </select>
                    </div>

                    <!-- Security Answer -->
                    <div class="input-group">
                        <label for="securityAnswer">Security Answer</label>
                        <input 
                            type="text" 
                            id="securityAnswer" 
                            name="securityAnswer" 
                            placeholder="Enter your answer (remember this!)"
                            required
                        >
                        <small style="color: #6b7280; font-size: 12px;">⚠️ You'll need this to reset your password</small>
                    </div>

                    <!-- Sign Up Button -->
                    <button type="submit" class="signup-btn" id="signupBtn">
                        <span id="signupBtnText">Sign Up</span>
                        <div id="signupSpinner" class="spinner hidden"></div>
                    </button>
                </form>

                <!-- Login Link -->
                <div class="login-link">
                    <p>Already have an account? <a href="login.html">Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="signup.js"></script>
</body>
</html>
